name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run unit tests
        run: ./gradlew :core:test

      - name: Assemble :core release AAR
        run: ./gradlew :core:assembleRelease

      - name: Assemble :compose-ui release AAR
        run: ./gradlew :compose-ui:assembleRelease

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 14

      - name: Upload AARs
        uses: actions/upload-artifact@v4
        with:
          name: release-aars
          path: |
            core/build/outputs/aar/*-release.aar
            compose-ui/build/outputs/aar/*-release.aar
          retention-days: 7
